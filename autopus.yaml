mode: full
project_name: autopus-adk
platforms:
    - claude-code
isolate_rules: true
language:
    comments: en
    commits: ko
    ai_responses: ko
architecture:
    auto_generate: true
    enforce: true
    layers: []
lore:
    enabled: true
    auto_inject: false
    required_trailers:
        - Constraint
    stale_threshold_days: 90
spec:
    id_format: SPEC-{DOMAIN}-{NUMBER}
    ears_types:
        - ubiquitous
        - event-driven
        - unwanted
        - optional
        - complex
    review_gate:
        enabled: true
        strategy: debate
        providers: [claude, gemini]
        judge: claude
        max_revisions: 2
        auto_collect_context: true
        context_max_lines: 500
methodology:
    mode: tdd
    enforce: true
    review_gate: true
router:
    strategy: balanced
    tiers:
        economy: claude-haiku-4-5
        premium: claude-opus-4-6
        standard: claude-sonnet-4-6
    categories:
        deep: premium
        git: economy
        quick: economy
        ultrabrain: premium
        visual: standard
        writing: standard
    intent_gate: true
hooks:
    pre_commit_arch: true
    pre_commit_lore: false
    react_ci_failure: false
    react_review: false
session:
    handoff_enabled: true
    continue_file: .auto-continue.md
    max_context_tokens: 2000
orchestra:
    enabled: true
    default_strategy: consensus
    timeout_seconds: 120
    providers:
        claude:
            binary: claude
            args: [--print, --model, opus, --effort, high]
        opencode:
            binary: opencode
            args: [run, -m, "openai/gpt-5.4"]
            pane_args: [-m, "openai/gpt-5.4"]
            prompt_via_args: true
        gemini:
            binary: gemini
            args: [-m, gemini-3.1-pro-preview]
            prompt_via_args: true
    commands:
        plan:
            strategy: consensus
            providers: [claude, opencode, gemini]
        review:
            strategy: debate
            providers: [claude, opencode, gemini]
        secure:
            strategy: consensus
            providers: [claude, opencode, gemini]
        brainstorm:
            strategy: debate
            providers: [claude, opencode, gemini]
quality:
    default: balanced
    presets:
        ultra:
            description: "모든 에이전트를 Opus로 실행. 최고 품질."
            agents:
                planner: opus
                executor: opus
                validator: opus
                tester: opus
                reviewer: opus
                architect: opus
                spec-writer: opus
                security-auditor: opus
                debugger: opus
                explorer: opus
                devops: opus
        balanced:
            description: "핵심 분석은 Opus, 구현은 Sonnet, 검증은 Haiku. 가성비 최적."
            agents:
                planner: opus
                architect: opus
                spec-writer: opus
                security-auditor: opus
                executor: sonnet
                tester: sonnet
                reviewer: sonnet
                debugger: sonnet
                devops: sonnet
                validator: haiku
                explorer: haiku
