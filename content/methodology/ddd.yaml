name: ddd
review_gate: true
enforce_rules:
  - "기존 동작을 보존하면서 개선"
  - "특성 테스트로 기존 동작 고정"
  - "최대 변환 크기: small (50줄 미만)"
stages:
  - name: analyze
    description: 기존 코드의 동작, 호출자, 사이드 이펙트를 완전히 이해한다
    rules:
      - "코드 목적 파악"
      - "fan_in (호출자 수) 파악"
      - "사이드 이펙트 목록화"
      - "기존 테스트 현황 파악"
    required_before: ""
  - name: preserve
    description: 기존 동작을 특성 테스트로 고정한다
    rules:
      - "특성 테스트(Characterization Test) 작성"
      - "테스트 없이 인터페이스 변경 금지"
      - "fan_in >= 3 함수에 @AX:ANCHOR 태그 추가"
    required_before: analyze
  - name: improve
    description: 작은 단계로 나누어 점진적으로 개선한다
    rules:
      - "단일 변환 크기: small (50줄 미만)"
      - "각 변환 후 전체 테스트 실행"
      - "리팩토링과 기능 변경 분리"
      - "기존 테스트 모두 GREEN 유지"
    required_before: preserve
