name: double-diamond
review_gate: true
enforce_rules:
  - "발산 단계에서 평가 금지 (아이디어 먼저)"
  - "수렴 전 충분한 인사이트 수집"
  - "사용자 관점에서 문제 정의"
stages:
  - name: discover
    description: 문제 공간을 넓게 탐색하여 인사이트를 수집한다
    rules:
      - "가정하지 말고 관찰하라"
      - "최소 5가지 인사이트 수집"
      - "사용자 관점 유지"
    required_before: ""
  - name: define
    description: 수집한 인사이트에서 핵심 문제를 정의한다
    rules:
      - "명확한 Problem Statement 작성"
      - "How Might We 질문으로 기회 재정의"
      - "이해관계자 합의 필요"
    required_before: discover
  - name: develop
    description: 다양한 해결책을 탐색하고 프로토타입을 만든다
    rules:
      - "최소 3가지 해결책 탐색"
      - "저충실도 프로토타입으로 빠른 검증"
      - "빠른 실패를 통한 학습"
    required_before: define
  - name: deliver
    description: 최적 해결책을 선택하고 구현한다
    rules:
      - "검증 가능한 성공 지표 정의"
      - "단계별 구현 계획 수립"
      - "출시 후 측정 방법 확보"
    required_before: develop
